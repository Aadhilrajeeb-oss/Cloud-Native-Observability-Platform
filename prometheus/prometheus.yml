global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    
  - job_name: "demo-app"
    static_configs:
      - targets: ["demo-app:8000"]
  
  - job_name: "user-service"
    static_configs:
       - targets: ["user-service:5000"]
       
  - job_name: "task-service"
    static_configs:
    - targets: ["task-service:6000"]