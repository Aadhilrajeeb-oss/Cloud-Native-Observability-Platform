name: DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Build frontend image
      run: docker build -t frontend ./frontend

    - name: Build auth-service image
      run: docker build -t auth-service ./services/auth-service

    - name: Build task-service image
      run: docker build -t task-service ./services/task-service

    - name: Build user-service image
      run: docker build -t user-service ./services/user-service

    - name: Success message
      run: echo "Build completed successfully 🚀"